name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# serialize concurrent runs of the same tag (a re-run, or delete+repush while
# the first run is in flight). without this, both runs would clobber their own
# DMG and push their own cask; tauri builds are not byte-reproducible, so the
# release could end up with one run's DMG and the other run's committed sha256.
# different tags use different groups and still run concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: make deps

      - name: Build
        run: VER="${GITHUB_REF_NAME#v}" make build

      - name: Upload DMG to release
        run: |
          gh release upload "$GITHUB_REF_NAME" src-tauri/target/release/bundle/dmg/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # HOMEBREW_TAP_TOKEN must be a PAT with write access to the separate
      # aleksey925/homebrew-apps tap repo, and that repo must already exist.
      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/update-homebrew-cask.sh
