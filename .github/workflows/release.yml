name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: make deps

      - name: Build
        run: VER="${GITHUB_REF_NAME#v}" make build

      - name: Create release and upload DMG
        run: gh release create "$GITHUB_REF_NAME" src-tauri/target/release/bundle/dmg/*.dmg --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
